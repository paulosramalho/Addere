<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Addere Control</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef2f7;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0eb;
      --brand: #5349d8;
      --brand-2: #1f7a8c;
      --ok: #138a5b;
      --warn: #b76e00;
      --bad: #bc2f3a;
      --orange: #de6b35;
      --shadow: 0 18px 50px rgba(23, 32, 51, .08);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); }
    body { line-height: 1.45; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { display: grid; grid-template-columns: 284px minmax(0, 1fr); min-height: 100vh; }

    .sidebar {
      background: #101527;
      color: #eef2ff;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }

    .brand img {
      width: 104px;
      max-height: 36px;
      object-fit: contain;
      background: #fff;
      border-radius: 7px;
      padding: 5px 8px;
    }

    .brand small { display: block; color: #aab2c8; margin-top: 2px; font-size: 12px; }
    .nav-section { display: grid; gap: 6px; }
    .nav-title {
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #8d97b3;
      padding: 8px 10px 4px;
      font-weight: 800;
    }

    .nav-link {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 8px;
      align-items: center;
      width: 100%;
      border: 0;
      text-align: left;
      color: #cdd5ea;
      background: transparent;
      padding: 10px;
      border-radius: var(--radius);
      min-height: 42px;
    }

    .nav-link:hover { background: rgba(255,255,255,.07); color: #fff; }
    .nav-link.active { background: #fff; color: #172033; box-shadow: var(--shadow); }
    .nav-link .ico {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.09);
      font-size: 12px;
      font-weight: 900;
    }
    .nav-link.active .ico { background: #ecebff; color: var(--brand); }
    .nav-badge {
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
    }

    .sidebar-foot {
      margin-top: auto;
      border-top: 1px solid rgba(255,255,255,.12);
      padding-top: 14px;
      color: #aab2c8;
      font-size: 12px;
    }

    .main { min-width: 0; }
    .topbar {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 28px;
      background: rgba(245, 247, 251, .88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .page-title { display: grid; gap: 2px; }
    .page-title h1 { margin: 0; font-size: 24px; line-height: 1.1; letter-spacing: 0; }
    .page-title p { margin: 0; color: var(--muted); font-size: 13px; }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .clock {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 9px 12px;
      min-width: 166px;
      text-align: right;
      color: var(--muted);
      font-size: 12px;
    }
    .clock strong { display: block; color: var(--ink); font-size: 14px; }
    .content { padding: 26px 28px 42px; }

    .grid { display: grid; gap: 16px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.aside { grid-template-columns: minmax(0, 1.35fr) 360px; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }
    .panel-head h2 { margin: 0; font-size: 16px; letter-spacing: 0; }
    .panel-head p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    .panel-body { padding: 18px; }

    .metric {
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 124px;
      display: grid;
      align-content: space-between;
      box-shadow: var(--shadow);
    }
    .metric span { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .metric strong { display: block; font-size: 28px; letter-spacing: 0; line-height: 1.05; margin-top: 12px; }
    .metric small { color: var(--muted); margin-top: 8px; display: block; }
    .metric.ok { border-top: 4px solid var(--ok); }
    .metric.warn { border-top: 4px solid var(--warn); }
    .metric.bad { border-top: 4px solid var(--bad); }
    .metric.brand { border-top: 4px solid var(--brand); }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:hover { border-color: #b8c2d1; background: #f8fafc; }
    .btn.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    .btn.primary:hover { background: #4338ca; }
    .btn.teal { background: var(--brand-2); border-color: var(--brand-2); color: #fff; }
    .btn.bad { background: var(--bad); border-color: var(--bad); color: #fff; }
    .btn.slim { min-height: 30px; padding: 5px 9px; font-size: 12px; }
    .btn.icon { width: 38px; padding: 0; }

    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .tab {
      border: 1px solid var(--line);
      background: var(--surface);
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 800;
    }
    .tab.active { background: #ecebff; border-color: #d8d5ff; color: var(--brand); }

    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; background: #f8fafc; }
    td { font-size: 14px; }
    tr:hover td { background: #fbfcff; }

    .form-grid { display: grid; gap: 12px; }
    .form-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .form-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; font-weight: 800; color: #344054; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      padding: 10px 11px;
      min-height: 40px;
      outline: none;
    }
    .field textarea { min-height: 88px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(83, 73, 216, .12); }
    .field small { color: var(--muted); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid transparent;
    }
    .pill.ok { color: #05603a; background: #e7f7ef; border-color: #b9ecd1; }
    .pill.warn { color: #8a4b00; background: #fff2db; border-color: #ffdca6; }
    .pill.bad { color: #a11d2a; background: #ffeaed; border-color: #ffc5cc; }
    .pill.info { color: #175cd3; background: #e9f1ff; border-color: #c7dbff; }
    .pill.neutral { color: #475467; background: #eef2f7; border-color: #d9e0eb; }

    .list { display: grid; gap: 10px; }
    .item {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .item-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .item-title { font-weight: 900; }
    .muted { color: var(--muted); }
    .tiny { font-size: 12px; }
    .amount-pos { color: var(--ok); font-weight: 900; }
    .amount-neg { color: var(--bad); font-weight: 900; }
    .empty { padding: 24px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: var(--radius); background: #fbfcff; }

    .bar-row { display: grid; grid-template-columns: 124px 1fr 92px; align-items: center; gap: 10px; margin: 10px 0; }
    .bar-bg { height: 12px; border-radius: 999px; background: #edf1f7; overflow: hidden; }
    .bar { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--brand), var(--brand-2)); min-width: 4px; }

    .chat-shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); min-height: 580px; }
    .chat-people { border-right: 1px solid var(--line); padding: 12px; background: #fbfcff; }
    .person {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      border-radius: var(--radius);
      padding: 10px;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 10px;
      align-items: center;
    }
    .person.active, .person:hover { background: #fff; border-color: var(--line); }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: #ecebff;
      color: var(--brand);
      display: grid;
      place-items: center;
      font-weight: 900;
    }
    .chat-stream { padding: 14px; display: grid; align-content: start; gap: 10px; max-height: 435px; overflow: auto; background: #f8fafc; }
    .bubble { max-width: 78%; border: 1px solid var(--line); background: #fff; border-radius: var(--radius); padding: 10px 12px; justify-self: start; }
    .bubble.me { justify-self: end; background: #ecebff; border-color: #d8d5ff; }
    .bubble strong { display: block; margin-bottom: 4px; font-size: 12px; }
    .composer { border-top: 1px solid var(--line); padding: 12px; background: #fff; display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .composer input { border: 1px solid var(--line); border-radius: var(--radius); padding: 10px; }

    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; }
    .day {
      min-height: 96px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px;
      display: grid;
      align-content: start;
      gap: 6px;
    }
    .day strong { font-size: 12px; color: var(--muted); }
    .dot { min-height: 22px; border-radius: 6px; padding: 3px 6px; background: #e9f1ff; color: #175cd3; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dot.urgent { background: #ffeaed; color: #a11d2a; }
    .dot.done { background: #e7f7ef; color: #05603a; }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 80;
      background: #101527;
      color: #fff;
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      display: none;
      max-width: min(420px, calc(100vw - 40px));
    }
    .toast.show { display: block; }

    .mobile-menu { display: none; }

    @media (max-width: 1100px) {
      .grid.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.three, .grid.aside { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; position: fixed; z-index: 60; inset: 0 auto 0 0; width: min(310px, 86vw); }
      .sidebar.open { display: flex; }
      .mobile-menu { display: inline-flex; }
      .topbar { align-items: flex-start; padding: 14px 16px; }
      .content { padding: 18px 16px 32px; }
      .grid.two, .grid.four, .form-grid.two, .form-grid.three, .chat-shell { grid-template-columns: 1fr; }
      .chat-people { border-right: 0; border-bottom: 1px solid var(--line); }
      .calendar-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .clock { display: none; }
      .page-title h1 { font-size: 20px; }
    }

    @media print {
      .sidebar, .topbar, .btn, .tabs, form { display: none !important; }
      .app { display: block; }
      .content { padding: 0; }
      .panel, .metric { box-shadow: none; break-inside: avoid; }
    }
  </style>
</head>

    function loadState() {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) {
        const seeded = seedData();
        localStorage.setItem(STORE_KEY, JSON.stringify(seeded));
        return seeded;
      }
      try { return JSON.parse(raw); }
      catch {
        const seeded = seedData();
        localStorage.setItem(STORE_KEY, JSON.stringify(seeded));
        return seeded;
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function resetDemo() {
      state = seedData();
      saveState();
      render();
      toast("Dados de demonstracao restaurados.");
    }

    function nextId(items) {
      return (items || []).reduce((max, item) => Math.max(max, Number(item.id) || 0), 0) + 1;
    }

    function clientName(id) {
      return state.clients.find(c => Number(c.id) === Number(id))?.name || "Sem vinculo";
    }

    function userName(id) {
      return state.users.find(u => Number(u.id) === Number(id))?.name || "Usuario";
    }

    function accountName(id) {
      return state.accounts.find(a => Number(a.id) === Number(id))?.name || "Pendente";
    }

    function money(cents) {
      const value = (Number(cents) || 0) / 100;
      return value.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function dateBR(value) {
      if (!value) return "-";
      const d = new Date(value);
      return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" });
    }

    function dateTimeBR(value) {
      if (!value) return "-";
      const d = new Date(value);
      return d.toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function centsFromInput(value) {
      const normalized = String(value || "0").replace(/\./g, "").replace(",", ".");
      return Math.round(Number(normalized || 0) * 100);
    }

    function isoFromDateInput(value) {
      if (!value) return new Date().toISOString();
      return new Date(value + "T12:00:00").toISOString();
    }

    function statusPill(status) {
      const s = String(status || "").toUpperCase();
      const tone = s.includes("RECEB") || s.includes("EMIT") || s.includes("OK") || s.includes("CONCL") ? "ok" :
        s.includes("ATRAS") || s.includes("PENDENTE_CONTA") || s.includes("URGENTE") ? "bad" :
        s.includes("PREV") || s.includes("RASC") || s.includes("PEND") ? "warn" : "neutral";
      return `<span class="pill ${tone}">${escapeHtml(status || "-")}</span>`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => el.classList.remove("show"), 2600);
    }

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
    }

    window.addEventListener("hashchange", () => {
      route = location.hash.replace("#", "") || "dashboard";
      document.getElementById("sidebar").classList.remove("open");
      render();
    });

    function go(view) {
      location.hash = view;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("dateLine").textContent = now.toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "2-digit", year: "numeric" });
      document.getElementById("timeLine").textContent = now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }
    setInterval(updateClock, 1000);

    function renderSidebar() {
      const pendingReceipts = state.receipts.filter(r => r.status !== "RECEBIDO").length;
      const pendingLedger = state.ledger.filter(l => l.status === "PENDENTE_CONTA").length;
      const pendingNotices = state.messages.filter(m => m.type === "AVISO" && m.requiresConfirmation && !m.confirmations.includes(currentUserId)).length;
      const badgeByRoute = { recebimentos: pendingReceipts, livro: pendingLedger, notice: pendingNotices };
      document.getElementById("sidebar").innerHTML = `
        <div class="brand">
          <img src="Documentos/logo.png" alt="Addere">
          <div><strong>Control</strong><small>Replica AMR</small></div>
        </div>
        ${menu.map(section => `
          <div class="nav-section">
            <div class="nav-title">${section.group}</div>
            ${section.items.map(([ico, label, key]) => `
              <button class="nav-link ${route === key ? "active" : ""}" onclick="go('${key}')">
                <span class="ico">${ico}</span>
                <span>${label}</span>
                ${badgeByRoute[key] ? `<span class="nav-badge">${badgeByRoute[key]}</span>` : ""}

          </div>
        `).join("")}

          <strong>${escapeHtml(userName(currentUserId))}</strong><br>
          Admin Addere · sessao local<br>
          Dados persistem no navegador.
        </div>
      `;

    function render() {
      if (!views[route]) route = "dashboard";
      renderSidebar();
      document.getElementById("viewTitle").textContent = views[route].title;
      document.getElementById("viewSubtitle").textContent = views[route].subtitle;
      updateClock();
      const map = {
        notice: renderNotice,
        agenda: renderAgenda,
        dashboard: renderDashboard,
        recebimentos: renderReceipts,
        livro: renderLedger,
        clientes: renderClients,
        usuarios: renderUsers,
        contas: renderAccounts,
        seguranca: renderSecurity,
        importacao: renderPdfImport,
        nota: renderInvoices
      };
      document.getElementById("content").innerHTML = map[route]();
    }

    function dashboardStats() {
      const month = today.getMonth() + 1;
      const year = today.getFullYear();
      const ledgerMonth = state.ledger.filter(l => {
        const d = new Date(l.date);
        return d.getMonth() + 1 === month && d.getFullYear() === year;
      });
      const entradas = ledgerMonth.filter(l => l.es === "E" && l.flow === "REALIZADO").reduce((s, l) => s + l.amount, 0);
      const saidas = ledgerMonth.filter(l => l.es === "S" && l.flow === "REALIZADO").reduce((s, l) => s + l.amount, 0);
      const saldo = state.accounts.reduce((sum, account) => {
        const movimentado = state.ledger.filter(l => Number(l.accountId) === Number(account.id) && l.flow === "REALIZADO")
          .reduce((s, l) => s + (l.es === "E" ? l.amount : -l.amount), 0);
        return sum + account.initial + movimentado;
      }, 0);
      const openReceipts = state.receipts.filter(r => r.status !== "RECEBIDO").reduce((s, r) => s + r.amount, 0);
      const overdue = state.receipts.filter(r => r.status === "ATRASADO").length;
      const pendingLedger = state.ledger.filter(l => l.status === "PENDENTE_CONTA").length;
      return { entradas, saidas, saldo, openReceipts, overdue, pendingLedger };
    }

    function renderDashboard() {
      const stats = dashboardStats();
      const accountBars = state.accounts.map(a => {
        const movements = state.ledger.filter(l => Number(l.accountId) === Number(a.id) && l.flow === "REALIZADO")
          .reduce((s, l) => s + (l.es === "E" ? l.amount : -l.amount), 0);
        return { ...a, balance: a.initial + movements };
      });
      const maxBalance = Math.max(...accountBars.map(a => Math.abs(a.balance)), 1);
      const agendaHoje = state.events.filter(e => dateBR(e.start) === dateBR(new Date().toISOString()));
      const activity = [
        ...state.ledger.slice(-4).map(l => ({ date: l.date, title: l.history, detail: `${l.es === "E" ? "Entrada" : "Saida"} · ${money(l.amount)}` })),
        ...state.notes.slice(-3).map(n => ({ date: n.issuedAt || new Date().toISOString(), title: n.number, detail: `${n.status} · ${clientName(n.clientId)}` }))
      ].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 6);

      return `
        <div class="grid four">
          <div class="metric ok"><span>Saldo atual</span><strong>${money(stats.saldo)}</strong><small>Contas ativas + realizados</small></div>
          <div class="metric brand"><span>Entradas do mes</span><strong>${money(stats.entradas)}</strong><small>Receitas confirmadas</small></div>
          <div class="metric warn"><span>A receber</span><strong>${money(stats.openReceipts)}</strong><small>${stats.overdue} item(ns) atrasado(s)</small></div>
          <div class="metric bad"><span>Pendencias</span><strong>${stats.pendingLedger}</strong><small>Livro Caixa sem conta</small></div>
        </div>
        <div class="grid aside" style="margin-top:16px">
          <div class="panel">
            <div class="panel-head">
              <div><h2>Fluxo por conta</h2><p>Replica do dashboard financeiro do AMR adaptada para Addere.</p></div>
              <button class="btn slim" onclick="go('livro')">Abrir Livro Caixa</button>
            </div>
            <div class="panel-body">
              ${accountBars.map(a => `
                <div class="bar-row">
                  <strong class="tiny">${escapeHtml(a.name)}</strong>
                  <div class="bar-bg"><div class="bar" style="width:${Math.max(6, Math.abs(a.balance) / maxBalance * 100)}%"></div></div>
                  <span class="${a.balance >= 0 ? "amount-pos" : "amount-neg"}">${money(a.balance)}</span>
                </div>
              `).join("")}
            </div>
          </div>
          <div class="panel">
            <div class="panel-head"><div><h2>Agenda de hoje</h2><p>${agendaHoje.length} compromisso(s)</p></div></div>
            <div class="panel-body list">
              ${agendaHoje.length ? agendaHoje.map(e => `
                <div class="item">
                  <div class="item-row"><strong>${escapeHtml(e.title)}</strong>${statusPill(e.priority)}</div>
                  <div class="tiny muted">${dateTimeBR(e.start)} · ${escapeHtml(e.type)}</div>
                </div>
              `).join("") : `<div class="empty">Nenhum compromisso para hoje.</div>`}
            </div>
          </div>
        </div>
        <div class="grid two" style="margin-top:16px">
          <div class="panel">
            <div class="panel-head"><div><h2>Recebimentos criticos</h2><p>Itens previstos ou atrasados.</p></div></div>
            <div class="panel-body list">
              ${state.receipts.filter(r => r.status !== "RECEBIDO").map(r => `
                <div class="item">
                  <div class="item-row"><strong>${escapeHtml(clientName(r.clientId))}</strong>${statusPill(r.status)}</div>
                  <div>${escapeHtml(r.description)}</div>
                  <div class="item-row tiny muted"><span>Vencimento ${dateBR(r.dueDate)}</span><strong>${money(r.amount)}</strong></div>
                </div>
              `).join("") || `<div class="empty">Nao ha recebimentos pendentes.</div>`}
            </div>
          </div>
          <div class="panel">
            <div class="panel-head"><div><h2>Ultimas atividades</h2><p>Livro Caixa e notas fiscais.</p></div></div>
            <div class="panel-body list">
              ${activity.map(a => `
                <div class="item">
                  <div class="item-row"><strong>${escapeHtml(a.title)}</strong><span class="tiny muted">${dateBR(a.date)}</span></div>
                  <div class="tiny muted">${escapeHtml(a.detail)}</div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderNotice() {
      const notices = state.messages.filter(m => m.type === "AVISO").sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      const people = state.users.filter(u => u.id !== currentUserId && u.active);
      const chat = state.messages.filter(m => m.type === "CHAT" && (
        (m.from === currentUserId && m.to === activeChatUserId) ||
        (m.from === activeChatUserId && m.to === currentUserId)
      )).sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      return `
        <div class="tabs">
          <button class="tab ${noticeMode === "avisos" ? "active" : ""}" onclick="setNoticeMode('avisos')">Avisos</button>
          <button class="tab ${noticeMode === "chat" ? "active" : ""}" onclick="setNoticeMode('chat')">Chat</button>
        </div>
        ${noticeMode === "avisos" ? `
          <div class="grid aside">
            <div class="panel">
              <div class="panel-head"><div><h2>Avisos internos</h2><p>Mensagens broadcast com confirmacao opcional.</p></div></div>
              <div class="panel-body list">
                ${notices.map(m => `
                  <div class="item">
                    <div class="item-row">
                      <strong>${escapeHtml(userName(m.from))}</strong>
                      <span class="tiny muted">${dateTimeBR(m.createdAt)}</span>
                    </div>
                    <div>${escapeHtml(m.text)}</div>
                    <div class="item-row">
                      <div class="tiny muted">${m.requiresConfirmation ? `${m.confirmations.length} confirmacao(oes)` : "Sem confirmacao obrigatoria"}</div>
                      ${m.requiresConfirmation && !m.confirmations.includes(currentUserId) ? `<button class="btn slim primary" onclick="confirmNotice(${m.id})">Confirmar leitura</button>` : statusPill(m.requiresConfirmation ? "Confirmado" : "Aviso")}
                    </div>
                  </div>
                `).join("") || `<div class="empty">Nenhum aviso publicado.</div>`}
              </div>
            </div>
            <div class="panel">
              <div class="panel-head"><div><h2>Novo aviso</h2><p>Publicado para todos os usuarios ativos.</p></div></div>
              <div class="panel-body">
                <form onsubmit="postNotice(event)" class="form-grid">
                  <div class="field"><label>Mensagem</label><textarea name="text" required placeholder="Escreva o aviso..."></textarea></div>
                  <label class="tiny"><input type="checkbox" name="requiresConfirmation"> Exigir confirmacao de leitura</label>
                  <button class="btn primary" type="submit">Publicar aviso</button>
                </form>
              </div>
            </div>
          </div>
        ` : `
          <div class="panel">
            <div class="chat-shell">
              <div class="chat-people">
                ${people.map(u => `
                  <button class="person ${activeChatUserId === u.id ? "active" : ""}" onclick="selectChat(${u.id})">
                    <span class="avatar">${initials(u.name)}</span>
                    <span><strong>${escapeHtml(u.name)}</strong><br><span class="tiny muted">${escapeHtml(u.type)} · online</span></span>
                  </button>
                `).join("")}
              </div>
              <div>
                <div class="chat-stream">
                  ${chat.map(m => `
                    <div class="bubble ${m.from === currentUserId ? "me" : ""}">
                      <strong>${escapeHtml(userName(m.from))} · ${dateTimeBR(m.createdAt)}</strong>
                      ${escapeHtml(m.text)}
                    </div>
                  `).join("") || `<div class="empty">Sem mensagens nesta conversa.</div>`}
                </div>
                <form class="composer" onsubmit="postChat(event)">
                  <input name="text" required placeholder="Mensagem para ${escapeHtml(userName(activeChatUserId))}">
                  <button class="btn primary" type="submit">Enviar</button>
                </form>
              </div>
            </div>
          </div>
        `}
      `;
    }

    function setNoticeMode(mode) {
      noticeMode = mode;
      render();
    }

    function selectChat(id) {
      activeChatUserId = id;
      render();
    }

    function initials(name) {
      return String(name || "U").split(/\s+/).filter(Boolean).slice(0, 2).map(p => p[0]).join("").toUpperCase();
    }

    function postNotice(event) {
      event.preventDefault();
      const fd = new FormData(event.currentTarget);
      state.messages.push({
        id: nextId(state.messages),
        type: "AVISO",
        from: currentUserId,
        to: null,
        text: fd.get("text"),
        requiresConfirmation: fd.get("requiresConfirmation") === "on",
        confirmations: [],
        createdAt: new Date().toISOString(),
        reactions: []
      });
      saveState();
      render();
      toast("Aviso publicado.");
    }

    function postChat(event) {
      event.preventDefault();
      const fd = new FormData(event.currentTarget);
      state.messages.push({
        id: nextId(state.messages),
        type: "CHAT",
        from: currentUserId,
        to: activeChatUserId,
        text: fd.get("text"),
        requiresConfirmation: false,
        confirmations: [],
        createdAt: new Date().toISOString(),
        reactions: []
      });
      saveState();
      render();
      toast("Mensagem enviada.");
    }

    function confirmNotice(id) {
      const msg = state.messages.find(m => m.id === id);
      if (msg && !msg.confirmations.includes(currentUserId)) msg.confirmations.push(currentUserId);
      saveState();
      render();
      toast("Leitura confirmada.");
    }

    function renderAgenda() {
      const sorted = [...state.events].sort((a, b) => new Date(a.start) - new Date(b.start));
      const days = [];
      for (let i = 0; i < 14; i++) {
        const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + i, 12);
        const events = sorted.filter(e => dateBR(e.start) === dateBR(d.toISOString()));
        days.push({ d, events });
      }
      return `
        <div class="grid aside">
          <div class="panel">
            <div class="panel-head"><div><h2>Proximos 14 dias</h2><p>Visualizacao compacta inspirada na Agenda AMR.</p></div></div>
            <div class="panel-body calendar-grid">
              ${days.map(day => `
                <div class="day">
                  <strong>${day.d.toLocaleDateString("pt-BR", { weekday: "short", day: "2-digit", month: "2-digit" })}</strong>
                  ${day.events.map(e => `<div class="dot ${e.priority === "URGENTE" ? "urgent" : e.status === "CONCLUIDO" ? "done" : ""}" title="${escapeHtml(e.title)}">${escapeHtml(e.title)}</div>`).join("")}
                </div>
              `).join("")}
            </div>
          </div>
          <div class="panel">
            <div class="panel-head"><div><h2>Novo evento</h2><p>Participantes e lembretes locais.</p></div></div>
            <div class="panel-body">
              <form onsubmit="addEvent(event)" class="form-grid">
                <div class="field"><label>Titulo</label><input name="title" required></div>
                <div class="form-grid two">
                  <div class="field"><label>Data</label><input type="date" name="date" required></div>
                  <div class="field"><label>Hora</label><input type="time" name="time" value="10:00" required></div>
                </div>
                <div class="form-grid two">
                  <div class="field"><label>Tipo</label><select name="type">${["REUNIAO","TAREFA","COMPROMISSO","ENTREGA","OUTRO"].map(v => `<option>${v}</option>`).join("")}</select></div>
                  <div class="field"><label>Prioridade</label><select name="priority">${["NORMAL","ALTA","URGENTE","BAIXA"].map(v => `<option>${v}</option>`).join("")}</select></div>
                </div>
                <div class="field"><label>Participantes</label><select name="participants" multiple size="4">${state.users.filter(u => u.active).map(u => `<option value="${u.id}">${escapeHtml(u.name)}</option>`).join("")}</select></div>
                <div class="field"><label>Descricao</label><textarea name="description"></textarea></div>
                <button class="btn primary" type="submit">Salvar evento</button>
              </form>
            </div>
          </div>
        </div>
        <div class="panel" style="margin-top:16px">
          <div class="panel-head"><div><h2>Lista de eventos</h2><p>Status, convidados e recorrencia.</p></div></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Data</th><th>Evento</th><th>Participantes</th><th>Status</th><th>Acoes</th></tr></thead>
              <tbody>
                ${sorted.map(e => `
                  <tr>
                    <td>${dateTimeBR(e.start)}</td>
                    <td><strong>${escapeHtml(e.title)}</strong><br><span class="tiny muted">${escapeHtml(e.type)} · ${escapeHtml(e.priority)} · ${escapeHtml(e.recurrence || "NENHUMA")}</span></td>
                    <td>${(e.participants || []).map(userName).map(escapeHtml).join("<br>") || "-"}</td>
                    <td>${statusPill(e.status)}</td>
                    <td>
                      <button class="btn slim" onclick="setEventStatus(${e.id}, 'CONCLUIDO')">Concluir</button>
                      <button class="btn slim bad" onclick="setEventStatus(${e.id}, 'CANCELADO')">Cancelar</button>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function addEvent(event) {
      event.preventDefault();
      const fd = new FormData(event.currentTarget);
      const date = fd.get("date");
      const time = fd.get("time") || "10:00";
      const participants = Array.from(event.currentTarget.elements.participants.selectedOptions).map(o => Number(o.value));
      state.events.push({
        id: nextId(state.events),
        title: fd.get("title"),
        description: fd.get("description"),
        start: new Date(`${date}T${time}:00`).toISOString(),
        end: "",
        type: fd.get("type"),
        priority: fd.get("priority"),
        status: "PENDENTE",
        participants,
        reminders: [60],
        recurrence: "NENHUMA"
      });
      saveState();
      render();
      toast("Evento criado.");

      r.paidAt = new Date().toISOString();
      r.proof = r.proof || `baixa_${id}.pdf`;
      state.ledger.push({
        id: nextId(state.ledger),
        date: new Date().toISOString(),
        document: `REC-${String(id).padStart(3, "0")}`,
        es: "E",
        clientId: r.clientId,
        history: r.description,
        amount: r.amount,
        accountId: 1,
        origin: "PAGAMENTO_RECEBIDO",
        status: "OK",
        flow: "REALIZADO"
      });
      saveState();
      render();
      toast("Recebimento baixado e lancado no Livro Caixa.");

          <div class="table-wrap">
            <table>
              <thead><tr><th>Data</th><th>Doc.</th><th>E/S</th><th>Historico</th><th>Valor</th><th>Conta</th><th>Acoes</th></tr></thead>
              <tbody>
                ${pdfRows.map(r => `
                  <tr>
                    <td>${dateBR(r.date)}</td>
                    <td>${escapeHtml(r.document)}</td>
                    <td>${r.es}</td>
                    <td>${escapeHtml(r.history)}<br><span class="tiny muted">${escapeHtml(clientName(r.clientId))}</span></td>
                    <td class="${r.es === "E" ? "amount-pos" : "amount-neg"}">${money(r.amount)}</td>
                    <td>${escapeHtml(accountName(r.accountId))}</td>
                    <td>${r.confirmed ? statusPill("Confirmada") : `<button class="btn slim primary" onclick="confirmPdfRow('${r.rowId}')">Confirmar</button>`}</td>
                  </tr>
                `).join("") || `<tr><td colspan="7"><div class="empty">Envie um PDF para gerar linhas de revisao.</div></td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function parsePdf(event) {
      event.preventDefault();
      const file = event.currentTarget.elements.pdf.files[0];
      const competence = new FormData(event.currentTarget).get("competence");
      const [year, month] = String(competence).split("-").map(Number);
      pdfRows = [
        { rowId: "pdf-1", date: new Date(year, month - 1, 3, 12).toISOString(), document: "PIX-CLIENTE", es: "E", clientId: 1, history: "Recebimento Clara Mendes extraido do PDF", amount: 39700, accountId: 1, confirmed: false },
        { rowId: "pdf-2", date: new Date(year, month - 1, 5, 12).toISOString(), document: "TARIFA", es: "S", clientId: 1, history: "Tarifa bancaria Inter", amount: 1290, accountId: 1, confirmed: false },
        { rowId: "pdf-3", date: new Date(year, month - 1, 8, 12).toISOString(), document: "GOOGLE", es: "S", clientId: 5, history: "Google Ads extraido do PDF", amount: 90000, accountId: 3, confirmed: false },
        { rowId: "pdf-4", date: new Date(year, month - 1, 13, 12).toISOString(), document: "NFS-e", es: "E", clientId: 2, history: "NFS-e Vita Norte detectada", amount: 249700, accountId: 1, confirmed: false }
      ];
      state.pdfSessions.push({ id: nextId(state.pdfSessions), fileName: file.name, competence, total: pdfRows.length, confirmed: 0, createdAt: new Date().toISOString() });
      saveState();
      render();
      toast("PDF lido. Revise as linhas antes de confirmar.");
    }

    function confirmPdfRow(rowId) {
      const row = pdfRows.find(r => r.rowId === rowId);
      if (!row || row.confirmed) return;
      row.confirmed = true;
      state.ledger.push({
        id: nextId(state.ledger),
        date: row.date,
        document: row.document,
        es: row.es,
        clientId: row.clientId,
        history: row.history,
        amount: row.amount,
        accountId: row.accountId,
        origin: "IMPORT_PDF",
        status: "OK",
        flow: "REALIZADO"
      });
      const session = state.pdfSessions[state.pdfSessions.length - 1];
      if (session) session.confirmed += 1;
      saveState();
      render();
      toast("Linha confirmada no Livro Caixa.");
    }

    function confirmAllPdfRows() {
      pdfRows.filter(r => !r.confirmed).forEach(r => confirmPdfRow(r.rowId));
    }

    function renderInvoices() {
      return `
        <div class="grid aside">
          <div class="panel">
            <div class="panel-head"><div><h2>Notas fiscais</h2><p>Emissao mock com numero sequencial e vinculo a recebimento.</p></div></div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Numero</th><th>Cliente</th><th>Servico</th><th>Valor</th><th>Status</th><th>Emissao</th><th>Acoes</th></tr></thead>
                <tbody>
                  ${state.notes.map(n => `
                    <tr>
                      <td><strong>${escapeHtml(n.number)}</strong></td>
                      <td>${escapeHtml(clientName(n.clientId))}</td>
                      <td>${escapeHtml(n.service)}</td>
                      <td>${money(n.amount)}</td>
                      <td>${statusPill(n.status)}</td>
                      <td>${dateBR(n.issuedAt)}</td>
                      <td>${n.status === "RASCUNHO" ? `<button class="btn slim primary" onclick="issueInvoice(${n.id})">Emitir</button>` : `<button class="btn slim" onclick="createReceiptFromInvoice(${n.id})">Gerar recebimento</button>`}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </div>
          <div class="panel">
            <div class="panel-head"><div><h2>Nova nota</h2><p>Campos essenciais para integracao futura com prefeitura.</p></div></div>
            <div class="panel-body">
              <form onsubmit="addInvoice(event)" class="form-grid">
                <div class="field"><label>Cliente</label><select name="clientId">${state.clients.filter(c => c.type === "C" && c.active).map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join("")}</select></div>
                <div class="field"><label>Servico</label><textarea name="service" required>Licenciamento de software e inteligencia de trafego pago</textarea></div>
                <div class="form-grid two">
                  <div class="field"><label>Valor</label><input name="amount" placeholder="397,00" required></div>
                  <div class="field"><label>Municipio</label><input name="city" value="Sao Paulo"></div>
                </div>
                <button class="btn primary" type="submit">Criar rascunho</button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    function addInvoice(event) {
      event.preventDefault();
      const fd = new FormData(event.currentTarget);
      const id = nextId(state.notes);
      state.notes.push({
        id,
        number: `RASC-${String(80 + id).padStart(5, "0")}`,
        clientId: Number(fd.get("clientId")),
        service: fd.get("service"),
        amount: centsFromInput(fd.get("amount")),
        status: "RASCUNHO",
        issuedAt: "",
        city: fd.get("city")
      });
      saveState();
      render();
      toast("Rascunho criado.");
    }

    function issueInvoice(id) {
      const note = state.notes.find(n => n.id === id);
      if (!note) return;
      note.status = "EMITIDA";
      note.number = `NFS-${String(80 + id).padStart(5, "0")}`;
      note.issuedAt = new Date().toISOString();
      saveState();
      render();
      toast("Nota fiscal emitida na replica.");
    }

    function createReceiptFromInvoice(id) {
      const note = state.notes.find(n => n.id === id);
      if (!note) return;
      state.receipts.push({
        id: nextId(state.receipts),
        clientId: note.clientId,
        description: `Recebimento ${note.number}`,
        dueDate: new Date(Date.now() + 7 * 86400000).toISOString(),
        amount: note.amount,
        status: "PREVISTO",
        method: "",
        proof: "",
        noteId: note.id,
        paidAt: ""
      });
      saveState();
      render();
      toast("Recebimento gerado a partir da nota.");
    }

    render();
  </script>
</body>
</html>
